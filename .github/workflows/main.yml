name: Build & Release All Platforms

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (格式 v1.0.0)"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: 386
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          # 如需完整平台可恢复上个版本的 matrix

    outputs:
      build_time: ${{ steps.set-build-time.outputs.BUILD_TIME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"
          cache: false

      - name: Create Release Assets Directory
        run: mkdir -p "${{ github.workspace }}/release_assets"

      - name: Set Build Time
        id: set-build-time
        run: |
          build_time=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          echo "BUILD_TIME=$build_time" >> $GITHUB_OUTPUT

      - name: Build (Static Binary)
        run: |
          echo "Building iptest-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}..."
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -trimpath -ldflags="-s -w" \
          -o "${{ github.workspace }}/release_assets/iptest-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}" iptest.go
        shell: bash

      - name: Generate SHA256
        run: |
          cd "${{ github.workspace }}/release_assets"
          for file in $(find . -type f ! -name '*.sha256'); do
            sha256sum "$file" | awk '{print $1}' > "${file}.sha256"
          done
          echo "SHA256 files generated:"
          ls -1 *.sha256

      - name: Compress Artifacts
        run: |
          cd "${{ github.workspace }}/release_assets"
          for file in $(find . -type f ! -name '*.sha256'); do
            base=$(basename "$file")
            if [[ "$base" == *.exe ]]; then
              zip "${base%.exe}.zip" "$file"
            else
              tar -czf "${base}.tar.gz" "$file"
            fi
          done

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iptest-all-platforms
          path: ${{ github.workspace }}/release_assets/*

  release:
    name: Publish to GitHub Releases
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: iptest-all-platforms
          path: release_assets

      - name: Display Files
        run: ls -lh release_assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: "Release ${{ github.event.inputs.release_tag || github.ref_name }}"
          body: |
            ## 🚀 多平台构建版本
            **构建时间:** ${{ needs.build.outputs.build_time }}

            ✅ 所有 Linux 版本可在 **Ubuntu 18.04.6 LTS** 及以上运行  
            ✅ 使用纯 Go 静态编译 (CGO_DISABLED=0)  
            ✅ 自动生成 SHA256 校验文件  
            ✅ 同时打包 zip / tar.gz  

            完整变更日志：  
            https://github.com/${{ github.repository }}/commits/${{ github.event.inputs.release_tag || github.ref_name }}
          files: release_assets/*
          draft: false
          prerelease: ${{ contains(github.event.inputs.release_tag, '-rc') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
