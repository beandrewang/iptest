name: Build & Release for Ubuntu 18.04

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (格式 v1.0.0)"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build Linux (Ubuntu 18.04 compatible)
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.set-build-time.outputs.BUILD_TIME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"

      - name: Set Build Time
        id: set-build-time
        run: |
          build_time=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          echo "BUILD_TIME=$build_time" >> $GITHUB_OUTPUT

      - name: Build static Linux binary
        run: |
          mkdir -p release_assets
          echo "🔧 Building Linux amd64 binary for Ubuntu 18.04"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -trimpath -ldflags="-s -w" -o release_assets/iptest-linux-amd64 iptest.go

      - name: Generate SHA256
        run: |
          cd release_assets
          for file in *; do
            [ -f "$file" ] || continue
            sha256sum "$file" | awk '{print $1}' > "$file.sha256"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptest-linux-amd64
          path: release_assets/*

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: iptest-linux-amd64
          path: release_assets

      - name: Display files
        run: ls -lh release_assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: "Release ${{ github.event.inputs.release_tag || github.ref_name }}"
          body: |
            ## 🚀 Linux amd64 构建版本 (Ubuntu 18.04 LTS 兼容)
            **构建时间:** ${{ needs.build.outputs.build_time }}

            ✅ 静态编译，Ubuntu 18.04 LTS 可用  
            ✅ 自动生成 SHA256 校验文件  

            完整变更日志:  
            https://github.com/${{ github.repository }}/commits/${{ github.event.inputs.release_tag || github.ref_name }}
          files: release_assets/**/*
          draft: false
          prerelease: ${{ contains(github.event.inputs.release_tag, '-rc') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
