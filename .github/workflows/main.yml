name: Build & Release All Platforms

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (格式 v1.0.0)"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    outputs:
      build_time: ${{ steps.set-build-time.outputs.BUILD_TIME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"

      - name: Set Build Time
        id: set-build-time
        run: |
          build_time=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          echo "BUILD_TIME=$build_time" >> $GITHUB_OUTPUT

      - name: Build binary
        run: |
          mkdir -p release_assets
          echo "🔧 Building for ${{ matrix.goos }}/${{ matrix.goarch }}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -trimpath -ldflags="-s -w" \
          -o release_assets/iptest-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} iptest.go

      - name: Generate SHA256
        run: |
          cd release_assets
          for file in $(find . -type f ! -name '*.sha256'); do
            sha256sum "$file" | awk '{print $1}' > "${file}.sha256"
          done

      - name: Upload All Artifacts Once
        uses: actions/upload-artifact@v4
        with:
          name: iptest-all-platforms
          path: release_assets/*

  release:
    name: Publish to GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: iptest-all-platforms
          path: release_assets

      - name: Display Files
        run: ls -lh release_assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: "Release ${{ github.event.inputs.release_tag || github.ref_name }}"
          body: |
            ## 🚀 多平台构建版本
            **构建时间:** ${{ needs.build.outputs.build_time }}

            ✅ 所有 Linux 版本兼容 Ubuntu 18.04 LTS  
            ✅ 使用纯 Go 静态编译 (CGO_DISABLED=0)  
            ✅ 自动生成 SHA256 校验文件  
            ✅ 所有平台一次性发布

            完整变更日志:  
            https://github.com/${{ github.repository }}/commits/${{ github.event.inputs.release_tag || github.ref_name }}
          files: release_assets/**/*
          draft: false
          prerelease: ${{ contains(github.event.inputs.release_tag, '-rc') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
